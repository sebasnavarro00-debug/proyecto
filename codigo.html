<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Código</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #282c34;
            font-family: 'Courier New', monospace;
            color: #abb2bf;
        }

        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        a:hover {
            background: #764ba2;
        }

        h1 {
            color: #61dafb;
            margin: 0;
            flex: 1;
        }

        .code-container {
            background: #1e222a;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            border: 1px solid #444;
            max-width: 100%;
        }

        pre {
            margin: 0;
            line-height: 1.6;
        }

        code {
            font-size: 14px;
        }

        .hljs {
            background: transparent !important;
            padding: 0 !important;
        }

        .line-numbers {
            color: #5c6370;
            margin-right: 20px;
            user-select: none;
        }

        .footer {
            margin-top: 30px;
            color: #888;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📄 Código de tu Página</h1>
        <a href="/">← Volver</a>
    </div>

    <div class="code-container">
        <pre><code class="language-html"><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Hola Mundo! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: white;
            font-size: 72px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                         0 0 40px rgba(240, 147, 251, 0.5);
            animation: bounce 2s ease-in-out infinite, glow 3s ease-in-out infinite;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .emoji {
            display: inline-block;
            animation: spin 3s linear infinite;
            margin: 0 10px;
        }

        .emoji:nth-child(2) {
            animation: spin 3s linear infinite reverse;
        }

        .emoji:nth-child(3) {
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                                    0 0 40px rgba(240, 147, 251, 0.5); }
            50% { text-shadow: 0 0 30px rgba(255, 255, 255, 0.8),
                               0 0 60px rgba(240, 147, 251, 0.8); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(2px);
        }

        .float-up {
            animation: floatUp 6s ease-in forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px);
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            margin-top: 30px;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particlesContainer"></div>
    
    <div class="container">
        <h1>
            <span class="emoji">🎉</span>
            ¡Hola Mundo!
            <span class="emoji">🌍</span>
            <span class="emoji">✨</span>
        </h1>
        <p class="subtitle">🚀 Bienvenido a la web 🎨</p>
    </div>

    <script>
        // Crear partículas flotantes (efecto de humo)
        const particlesContainer = document.getElementById('particlesContainer');
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle float-up';
            
            const size = Math.random() * 15 + 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            const x = Math.random() * window.innerWidth;
            const y = window.innerHeight + 50;
            
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            const duration = Math.random() * 4 + 4;
            particle.style.animationDuration = duration + 's';
            
            particlesContainer.appendChild(particle);
            
            setTimeout(() => particle.remove(), duration * 1000);
        }
        
        // Crear partículas continuamente
        setInterval(createParticle, 300);
        
        // Crear algunas partículas iniciales
        for (let i = 0; i < 5; i++) {
            setTimeout(createParticle, i * 100);
        }

        // Efecto confeti al hacer clic
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle float-up';
                
                const size = Math.random() * 12 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
                
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 4000);
            }
        });
    </script>
</body>
</html></code></pre>
